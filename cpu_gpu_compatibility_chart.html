<script>

  {name:'RX 7900 XTX',      score:norm(31412, GPU_MAX),  brand:'amd',    _raw:31412},

  {name:'RTX 4090',         score:norm(38067, GPU_MAX),  brand:'nvidia', _raw:38067},
  {name:'RTX 5090',         score:norm(38958, GPU_MAX),  brand:'nvidia', _raw:38958},
];

function clusterByScore(processors, tolerance) {
  const sorted = [...processors].sort((a,b) => a.score - b.score);
  const clusters = [];
  let current = [sorted[0]];
  for (let i = 1; i < sorted.length; i++) {
    if (sorted[i].score - current[0].score <= tolerance) {
      current.push(sorted[i]);
    } else {
      clusters.push(current);
      current = [sorted[i]];
    }
  }
  clusters.push(current);
  return clusters;
}

const CTOL = 3;
const GTOL = 3;
const cpuClusters = clusterByScore(cpus, CTOL);
const gpuClusters = clusterByScore(gpus, GTOL);

const cpuMaxN = Math.max(...cpuClusters.map(c => c.length));
const gpuMaxN = Math.max(...gpuClusters.map(c => c.length));
const CHART_PADDING = 3;
const ROW_GAP = 10;
const totalSlots = (gpuMaxN - 1) + (cpuMaxN - 1);
const availHeight = 100 - 2 * CHART_PADDING - ROW_GAP;
const CLUSTER_Y_SPACING = Math.min(7, availHeight / Math.max(1, totalSlots));

const gpuHalf = (gpuMaxN - 1) / 2 * CLUSTER_Y_SPACING;
const cpuHalf = (cpuMaxN - 1) / 2 * CLUSTER_Y_SPACING;
const GPU_Y = CHART_PADDING + gpuHalf;
const CPU_Y = 100 - CHART_PADDING - cpuHalf;

function buildScatterPoints(clusters, baseY, type) {
  const points = [];
  clusters.forEach(cluster => {
    const avgScore = Math.round(cluster.reduce((s,c) => s + c.score, 0) / cluster.length);
    const n = cluster.length;
    cluster.forEach((proc, i) => {
      const y = baseY + (i - (n-1)/2) * CLUSTER_Y_SPACING;
      points.push({
        x: avgScore, y: y,
        name: proc.name, brand: proc.brand,
        score: avgScore,
        type: type,
        _clusterSize: n,
        _clusterIdx: i,
      });
    });
  });
  return points;
}

const cpuPoints = buildScatterPoints(cpuClusters, CPU_Y, 'cpu');
const gpuPoints = buildScatterPoints(gpuClusters, GPU_Y, 'gpu');

function compatRange(score) {
  const margin = 22;
  return [Math.max(0, score - margin), Math.min(105, score + margin)];
}

const intelColor = 'rgba(61,142,232,0.13)';
const amdCpuColor = 'rgba(232,92,48,0.13)';
const nvidiaColor = 'rgba(32,160,96,0.13)';
const amdGpuColor = 'rgba(204,34,68,0.13)';

const intelBorder = 'rgba(61,142,232,0.5)';
const amdCpuBorder = 'rgba(232,92,48,0.5)';
const nvidiaBorder = 'rgba(32,160,96,0.5)';
const amdGpuBorder = 'rgba(204,34,68,0.5)';

const intelDot = '#3D8EE8';
const amdCpuDot = '#E85C30';
const nvidiaDot = '#20A060';
const amdGpuDot = '#CC2244';

const cpuColors = cpuPoints.map(c => c.brand === 'intel' ? intelDot : amdCpuDot);
const cpuRadius = cpuPoints.map(p => p._clusterSize > 4 ? 6 : (p._clusterSize > 2 ? 7 : 8));
const cpuHoverR = cpuPoints.map(p => p._clusterSize > 4 ? 8 : (p._clusterSize > 2 ? 9 : 10));
const gpuColors = gpuPoints.map(g => g.brand === 'nvidia' ? nvidiaDot : amdGpuDot);
const gpuRadius = gpuPoints.map(p => p._clusterSize > 4 ? 6 : (p._clusterSize > 2 ? 7 : 8));
const gpuHoverR = gpuPoints.map(p => p._clusterSize > 4 ? 8 : (p._clusterSize > 2 ? 9 : 10));

const tooltip = document.getElementById('tooltip');
let activeItem = null;

const chart = new Chart(document.getElementById('compatChart'), {
  type: 'scatter',
  data: {
    datasets: [
      {
        label: 'CPU',
        data: cpuPoints,
        pointBackgroundColor: cpuColors,
        pointBorderColor: cpuColors,
        pointRadius: cpuRadius,
        pointHoverRadius: cpuHoverR,
        showLine: true,
        borderColor: 'rgba(120,120,120,0.3)',
        borderWidth: 1.5,
        borderDash: [4,3],
        tension: 0,
        order: 2,
      },
      {
        label: 'GPU',
        data: gpuPoints,
        pointBackgroundColor: gpuColors,
        pointBorderColor: gpuColors,
        pointRadius: gpuRadius,
        pointHoverRadius: gpuHoverR,
        showLine: true,
        borderColor: 'rgba(120,120,120,0.3)',
        borderWidth: 1.5,
        borderDash: [4,3],
        tension: 0,
        order: 2,
      }
    ]
  },
  options: {
    responsive: true,
    maintainAspectRatio: false,
    animation: { duration: 400 },
    scales: {
      x: {
        min: 0,
        max: 108,
        title: { display: true, text: 'Относительная производительность', color: 'rgba(128,128,128,0.8)', font: { size: 12 } },
        grid: { color: 'rgba(128,128,128,0.1)' },
        ticks: { color: 'rgba(128,128,128,0.7)', font: { size: 11 } }
      },
      y: {
        min: 0,
        max: 100,
        display: false,
      }
    },
    plugins: {
      legend: { display: false },
      tooltip: { enabled: false },
    },
    onHover(event, elements) {
      if (elements.length > 0) {
        const el = elements[0];
        const ds = chart.data.datasets[el.datasetIndex];
        const pt = ds.data[el.index];
        activeItem = pt;
        const [lo, hi] = compatRange(pt.score);
        const otherSet = pt.type === 'cpu' ? gpuPoints : cpuPoints;
        const matches = otherSet.filter(o => o.score >= lo && o.score <= hi);
        const seen = new Set();
        const matchNames = matches.filter(m => { const k = m.name; if (seen.has(k)) return false; seen.add(k); return true; }).map(m => m.name).join(', ') || 'нет';
        const typeLabel = pt.type === 'cpu' ? 'Процессор' : 'Видеокарта';
        const otherLabel = pt.type === 'cpu' ? 'GPU' : 'CPU';
        tooltip.innerHTML = `<strong>${pt.name}</strong><br><span style="color:rgba(128,128,128,0.8);font-size:11px;">${typeLabel} · рейтинг ${pt.score}</span><br><hr style="border:none;border-top:0.5px solid rgba(128,128,128,0.2);margin:6px 0;"><span style="font-size:11px;color:rgba(128,128,128,0.9);">Совместимые ${otherLabel}:</span><br><span style="font-size:11px;">${matchNames}</span>`;
        tooltip.style.display = 'block';
        chart.canvas.style.cursor = 'pointer';
      } else {
        activeItem = null;
        tooltip.style.display = 'none';
        chart.canvas.style.cursor = 'default';
      }
      chart.draw();
    },
  },
  plugins: [{
    id: 'compatBands',
    beforeDatasetsDraw(chart) {
      const {ctx, scales: {x, y}} = chart;

      const cpuX = cpuPoints.map(p => x.getPixelForValue(p.score));
      let minGap = Infinity;
      for (let i = 1; i < cpuX.length; i++) {
        if (cpuX[i] !== cpuX[i-1]) {
          const gap = Math.abs(cpuX[i] - cpuX[i-1]);
          if (gap < minGap) minGap = gap;
        }
      }
      const gpuX = gpuPoints.map(p => x.getPixelForValue(p.score));
      for (let i = 1; i < gpuX.length; i++) {
        if (gpuX[i] !== gpuX[i-1]) {
          const gap = Math.abs(gpuX[i] - gpuX[i-1]);
          if (gap < minGap) minGap = gap;
        }
      }
      const compact = minGap < 55;
      chart._compact = compact;

      const cpuYpx = y.getPixelForValue(CPU_Y);
      const gpuYpx = y.getPixelForValue(GPU_Y);

      const uniqueItems = [];
      const seenNames = new Set();
      [...cpuPoints, ...gpuPoints].forEach(pt => {
        if (!seenNames.has(pt.name)) {
          seenNames.add(pt.name);
          uniqueItems.push(pt);
        }
      });

      uniqueItems.forEach(pt => {
        const isActive = activeItem && activeItem.name === pt.name;
        if (!isActive) return;
        const [lo, hi] = compatRange(pt.score);
        const x1 = x.getPixelForValue(lo);
        const x2 = x.getPixelForValue(hi);

        const rawFill = pt.type === 'cpu'
          ? (pt.brand === 'intel' ? [61,142,232] : [232,92,48])
          : (pt.brand === 'nvidia' ? [32,160,96] : [204,34,68]);

        const lineY = pt.type === 'cpu' ? cpuYpx : gpuYpx;
        const extendTo = pt.type === 'cpu' ? gpuYpx : cpuYpx;

        ctx.save();
        ctx.fillStyle = `rgba(${rawFill[0]},${rawFill[1]},${rawFill[2]},0.12)`;
        ctx.beginPath();
        ctx.roundRect(x1, Math.min(lineY, extendTo) - 5, x2-x1, Math.abs(extendTo-lineY)+10, 4);
        ctx.fill();
        ctx.restore();
      });

      ctx.save();
      ctx.fillStyle = 'rgba(128,128,128,0.55)';
      ctx.font = '500 11px ' + (getComputedStyle(document.body).fontFamily || 'sans-serif');
      ctx.textAlign = 'left';
      ctx.fillText('▶ CPU', x.getPixelForValue(3), cpuYpx + 4);
      ctx.fillText('▶ GPU', x.getPixelForValue(3), gpuYpx + 4);
      ctx.restore();
    },
    afterDatasetsDraw(chart) {
      const {ctx, scales: {x, y}} = chart;
      const font = '9px ' + (getComputedStyle(document.body).fontFamily || 'sans-serif');

      ctx.save();
      ctx.font = font;
      ctx.textAlign = 'left';
      ctx.textBaseline = 'middle';

      function drawClusterLabels(points, clusters, kind) {
        const pointByName = {};
        points.forEach(p => { pointByName[p.name] = p; });

        clusters.forEach(cluster => {
          const p0 = pointByName[cluster[0].name];
          if (!p0) return;
          const px0 = x.getPixelForValue(p0.score);
          const membersPx = cluster.map(c => {
            const p = pointByName[c.name];
            return { name: c.name, brand: c.brand, type: kind, py: p ? y.getPixelForValue(p.y) : 0 };
          });

          const topY = membersPx[0].py;
          const botY = membersPx[membersPx.length - 1].py;

          if (membersPx.length > 1) {
            ctx.save();
            ctx.strokeStyle = 'rgba(128,128,128,0.25)';
            ctx.lineWidth = 1;
            ctx.setLineDash([2, 3]);
            ctx.beginPath();
            ctx.moveTo(px0, topY);
            ctx.lineTo(px0, botY);
            ctx.stroke();
            ctx.setLineDash([]);

            ctx.strokeStyle = 'rgba(128,128,128,0.25)';
            ctx.lineWidth = 1;
            [topY, botY].forEach(capY => {
              ctx.beginPath();
              ctx.moveTo(px0 - 4, capY);
              ctx.lineTo(px0 + 4, capY);
              ctx.stroke();
            });
            ctx.restore();
          }

          membersPx.forEach(m => {
            const isCpu = m.type === 'cpu';
            let color;
            if (m.brand === 'intel') color = intelDot;
            else if (m.brand === 'amd') color = isCpu ? amdCpuDot : amdGpuDot;
            else color = m.brand === 'nvidia' ? nvidiaDot : (isCpu ? intelDot : amdGpuDot);
            ctx.fillStyle = color;
            ctx.fillText(m.name, px0 + 14, m.py);
          });
        });
      }

      if (!activeItem || activeItem.type !== 'cpu') {
        drawClusterLabels(cpuPoints, cpuClusters, 'cpu');
      }
      if (!activeItem || activeItem.type !== 'gpu') {
        drawClusterLabels(gpuPoints, gpuClusters, 'gpu');
      }

      ctx.restore();
    }
  }]
});

document.getElementById('compatChart').addEventListener('mousemove', function(e) {
  const rect = this.getBoundingClientRect();
  tooltip.style.left = (e.clientX + 14) + 'px';
  tooltip.style.top = (e.clientY - 10) + 'px';
});

document.getElementById('compatChart').addEventListener('mouseleave', function() {
  tooltip.style.display = 'none';
  activeItem = null;
  chart.draw();
});
</script>
